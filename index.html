<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>خطة الحفظ والمراجعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --g:#1a7a5e;--gd:#0f5442;--gl:#e8f5f0;--gm:#c8e6db;
  --gold:#c9972a;--go:#fdf3dc;
  --gray:#f5f4f0;--border:#e2dfd8;--text:#1a1a1a;--muted:#888;--white:#fff;
  --r:10px;--sh:0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}

/* TOP */
.top{background:linear-gradient(135deg,var(--gd),var(--g));padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(15,84,66,.3);}
.top-brand{display:flex;align-items:center;gap:8px;color:#fff;}
.top-icon{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
.top-title{font-size:14px;font-weight:800;}
.top-sub{font-size:10px;opacity:.7;}
.top-btns{display:flex;gap:5px;}
.tb{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:7px;padding:5px 10px;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.tb:hover{background:rgba(255,255,255,.28);}
.tb.gold{background:var(--gold);border-color:#a87d20;}

/* STEPS BAR */
.steps{display:flex;border-bottom:1px solid var(--border);background:var(--white);}
.step{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.step.active{color:var(--gd);border-bottom-color:var(--g);}
.step.done{color:var(--g);}
.step-n{font-size:15px;font-weight:800;display:block;margin-bottom:1px;}

/* MAIN */
.main{max-width:640px;margin:0 auto;padding:14px 12px 80px;}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;box-shadow:var(--sh);}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--gd);display:flex;align-items:center;gap:6px;}
.card-bd{padding:14px 16px;}

/* FORM */
.fg{margin-bottom:10px;}
.fg label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px;}
input[type=text],textarea,select{font-family:'Tajawal',sans-serif;font-size:13px;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(26,122,94,.1);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* GENDER */
.gtog{display:flex;background:var(--gray);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:14px;}
.gopt input{display:none;}
.gopt{flex:1;}
.gopt label{display:block;padding:7px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;}
.gopt input:checked+label{background:var(--white);color:var(--gd);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* BUTTONS */
.btn{font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;padding:9px 16px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--gray);}
.btn.p{background:var(--g);border-color:var(--gd);color:#fff;}
.btn.p:hover{background:var(--gd);}
.btn.gold{background:var(--gold);border-color:#a87d20;color:#fff;}
.btn.sm{font-size:11px;padding:5px 10px;}
.btn.xs{font-size:11px;padding:3px 8px;}
.btn.danger{color:#c0392b;border-color:#f5c0b0;}

/* NAV */
.nav{display:flex;justify-content:space-between;margin-top:14px;}

/* TEMPLATE CARDS */
.tpl-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.tpl{padding:12px;border:2px solid var(--border);border-radius:var(--r);cursor:pointer;background:var(--white);transition:all .15s;}
.tpl:hover,.tpl.sel{border-color:var(--g);background:var(--gl);}
.tpl-icon{font-size:20px;margin-bottom:5px;}
.tpl-name{font-size:12px;font-weight:700;color:var(--gd);}
.tpl-desc{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5;}

/* WEEK BUILDER */
.days-grid{display:flex;flex-direction:column;gap:6px;}
.day-row{background:var(--gray);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.day-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none;}
.day-name{font-size:13px;font-weight:700;color:var(--gd);}
.day-toggle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--white);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.day-toggle.on{background:var(--g);border-color:var(--gd);color:#fff;}
.day-fields{display:none;padding:8px 12px 10px;background:var(--white);border-top:1px solid var(--border);}
.day-fields.open{display:block;}
.day-fields .fg{margin-bottom:7px;}
.day-fields .fg:last-child{margin-bottom:0;}
.day-type-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.dtype{font-family:'Tajawal',sans-serif;font-size:11px;padding:4px 10px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .12s;}
.dtype.on{background:var(--gl);border-color:var(--g);color:var(--gd);font-weight:700;}

/* SPECIAL ROW */
.special-rows{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.special-row{display:flex;gap:6px;align-items:center;background:var(--go);border:1px solid #e8d5a0;border-radius:8px;padding:7px 10px;}
.special-row input{flex:1;}
.special-row select{width:auto;min-width:90px;}

/* PREVIEW TABLE (step 3) */
.preview-wrap{overflow-x:auto;}
.plan-tbl{width:100%;border-collapse:collapse;min-width:300px;}
.plan-tbl th{background:var(--gd);color:#fff;padding:9px 10px;font-size:12px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,.15);}
.plan-tbl td{border:1px solid var(--border);padding:9px 10px;font-size:13px;vertical-align:middle;}
.plan-tbl tr.span-r td{background:var(--go);color:var(--gold);font-weight:800;text-align:center;font-size:13px;border:1px solid #e8d5a0;}
.plan-tbl tr.header-r td{background:var(--gl);color:var(--gd);font-weight:700;text-align:center;font-size:11px;}
.plan-tbl tr:nth-child(even):not(.span-r):not(.header-r) td{background:#fafaf8;}
.plan-tbl td.day-col{font-weight:700;color:var(--gd);text-align:center;width:70px;}
.plan-tbl td.num-col{color:var(--muted);font-size:11px;text-align:center;width:28px;}
.plan-tbl td.sig-col{width:70px;}
.check-col{text-align:center;font-size:16px;}

/* TOAST */
.toast-c{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none;}
.toast{padding:9px 18px;border-radius:99px;font-size:12px;color:#fff;font-family:'Tajawal',sans-serif;opacity:0;transform:translateY(14px);transition:all .25s;box-shadow:0 4px 14px rgba(0,0,0,.2);white-space:nowrap;}
.toast.show{opacity:1;transform:translateY(0);}
.tok{background:var(--gd)}.terr{background:#c0392b}.tinf{background:#1a5f8a}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.mbox{background:var(--white);border-radius:14px;padding:20px;width:320px;max-width:94vw;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.mbox h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--gd);}
.mopts{display:flex;flex-direction:column;gap:7px;}

@media(max-width:480px){.frow{grid-template-columns:1fr;}.tpl-list{grid-template-columns:1fr;}}
@media print{
  .top,.steps,.nav,.no-print{display:none!important;}
  body{background:#fff;}
  .card{box-shadow:none;border:none;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top no-print">
  <div class="top-brand">
    <div class="top-icon">📖</div>
    <div>
      <div class="top-title">بانيّ خطة الحفظ</div>
      <div class="top-sub">صمّم وأطبع في دقيقتين</div>
    </div>
  </div>
  <div class="top-btns">
    <button class="tb" onclick="savePlan()">⬇ حفظ</button>
    <label class="tb" style="cursor:pointer;">⬆ فتح<input type="file" accept=".json" onchange="loadPlan(event)" style="display:none"/></label>
    <button class="tb gold" onclick="openExport()">🖨 طباعة</button>
  </div>
</div>

<!-- STEPS -->
<div class="steps no-print">
  <div class="step active" id="st1" onclick="goStep(1)"><span class="step-n">1</span>البيانات</div>
  <div class="step" id="st2" onclick="goStep(2)"><span class="step-n">2</span>الخطة</div>
  <div class="step" id="st3" onclick="goStep(3)"><span class="step-n">3</span>المعاينة</div>
</div>

<!-- EXPORT MODAL -->
<div class="mbg" id="exp-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="mbox">
    <h3>🖨 تصدير الخطة</h3>
    <div class="mopts">
      <button class="btn p" onclick="doPrint('p');document.getElementById('exp-modal').classList.remove('open')" style="justify-content:center;">📄 طباعة / PDF عمودي</button>
      <button class="btn" onclick="doPrint('l');document.getElementById('exp-modal').classList.remove('open')" style="justify-content:center;">📋 طباعة / PDF أفقي</button>
    </div>
    <button class="btn" style="width:100%;justify-content:center;margin-top:8px;" onclick="document.getElementById('exp-modal').classList.remove('open')">إغلاق</button>
  </div>
</div>

<div class="toast-c" id="tc"></div>

<div class="main">

<!-- ══ STEP 1: INFO ══ -->
<div id="s1">
  <div class="card">
    <div class="card-hd">👤 بيانات الخطة</div>
    <div class="card-bd">
      <div class="gtog">
        <div class="gopt"><input type="radio" name="g" id="gf" value="f" checked onchange="upd()"/><label for="gf">👩 طالبة / معلمة</label></div>
        <div class="gopt"><input type="radio" name="g" id="gm" value="m" onchange="upd()"/><label for="gm">👨 طالب / معلم</label></div>
      </div>
      <div class="frow">
        <div class="fg"><label id="ls">اسم الطالبة</label><input type="text" id="s-name" placeholder="الاسم الكامل"/></div>
        <div class="fg"><label id="lt">المعلمة</label><input type="text" id="s-teacher" placeholder="الاسم"/></div>
        <div class="fg"><label>الحلقة</label><input type="text" id="s-halaqa" placeholder="اسم الحلقة"/></div>
        <div class="fg"><label>الفترة</label><input type="text" id="s-date" placeholder="مثال: يونيو 2025"/></div>
      </div>
      <div class="fg"><label>عنوان الخطة</label><input type="text" id="s-title" placeholder="مثال: خطة حفظ الأحقاف — الفصل الأول"/></div>
    </div>
  </div>
  <div class="nav no-print">
    <div></div>
    <button class="btn p" onclick="goStep(2)">التالي: بناء الخطة ←</button>
  </div>
</div>

<!-- ══ STEP 2: PLAN BUILDER ══ -->
<div id="s2" style="display:none;">

  <!-- Template selector -->
  <div class="card">
    <div class="card-hd">📋 نوع الخطة</div>
    <div class="card-bd">
      <div class="tpl-list" id="tpl-list"></div>
    </div>
  </div>

  <!-- Week builder -->
  <div class="card" id="week-builder">
    <div class="card-hd" style="justify-content:space-between;">
      <span>📅 أيام الأسبوع</span>
      <div style="display:flex;gap:6px;">
        <button class="btn xs" onclick="toggleAllDays(true)">تفعيل الكل</button>
        <button class="btn xs" onclick="toggleAllDays(false)">إيقاف الكل</button>
      </div>
    </div>
    <div class="card-bd">
      <div class="days-grid" id="days-grid"></div>

      <!-- Special rows -->
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px;">صفوف خاصة (اختياري) — مثل الجمعة أو الإجازة</div>
        <div class="special-rows" id="special-rows"></div>
        <button class="btn sm" onclick="addSpecial()" style="margin-top:6px;">+ إضافة صف خاص</button>
      </div>
    </div>
  </div>

  <!-- Month builder -->
  <div class="card" id="month-builder" style="display:none;">
    <div class="card-hd">📆 الخطة الشهرية</div>
    <div class="card-bd">
      <div class="fg"><label>عدد الأسابيع</label>
        <select id="month-weeks">
          <option value="4">4 أسابيع</option>
          <option value="5">5 أسابيع</option>
        </select>
      </div>
      <div class="fg"><label>الحفظ الأسبوعي (نفس لكل أسبوع)</label>
        <input type="text" id="month-hifz" placeholder="مثال: وجهين + مراجعة 5 أوجه"/>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:4px;">أو خصص كل أسبوع بالضغط على الأيام في القسم أعلاه</p>
    </div>
  </div>

  <div class="nav no-print">
    <button class="btn" onclick="goStep(1)">← السابق</button>
    <button class="btn p" onclick="buildAndPreview()">معاينة وطباعة ←</button>
  </div>
</div>

<!-- ══ STEP 3: PREVIEW ══ -->
<div id="s3" style="display:none;">
  <div class="card">
    <div class="card-hd" style="justify-content:space-between;">
      <span id="preview-title">📋 معاينة الخطة</span>
      <button class="btn gold sm no-print" onclick="openExport()">🖨 طباعة</button>
    </div>
    <div class="preview-wrap" id="preview-wrap">
      <!-- built by JS -->
    </div>
  </div>
  <div class="nav no-print">
    <button class="btn" onclick="goStep(2)">← تعديل الخطة</button>
    <button class="btn p" onclick="openExport()">🖨 طباعة / PDF</button>
  </div>
</div>

</div>

<script>
// ══ DATA ══
const DAYS = ['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'];
const DAY_TYPES = [
  {id:'hifz', label:'حفظ جديد'},
  {id:'muraja', label:'مراجعة'},
  {id:'both', label:'حفظ + مراجعة'},
  {id:'tathbit', label:'تثبيت'},
  {id:'exam', label:'اختبار'},
  {id:'free', label:'إجازة'},
];

const TEMPLATES = [
  {id:'weekly', icon:'🗓', name:'أسبوعية', desc:'السبت — الخميس\nحفظ ومراجعة يومية'},
  {id:'weekly2', icon:'📖', name:'أسبوعية موسعة', desc:'مع التكرار والتسميع\nوخانة التوقيع'},
  {id:'monthly', icon:'📆', name:'شهرية', desc:'4 أسابيع مقسمة\nبهدف أسبوعي'},
  {id:'custom', icon:'✨', name:'مخصصة', desc:'اختر أي أيام\nوخصص كل يوم'},
];

let selTpl = 'weekly';
let fem = true;

// Day state
let dayState = DAYS.map((d,i)=>({
  name:d, on:i<6, // all except friday by default... no, all 6 days on
  type:'both',
  hifz:'', muraja:'', repeat:'4 مرات', note:''
}));

let specials = []; // [{pos:'before'|'after', dayIdx, text, color}]
let planRows = []; // built rows

// ══ INIT ══
function init(){
  renderTpls();
  renderDays();
  upd();
}

function upd(){
  fem = document.querySelector('input[name=g]:checked').value==='f';
  document.getElementById('ls').textContent = fem?'اسم الطالبة':'اسم الطالب';
  document.getElementById('lt').textContent = fem?'المعلمة':'المعلم';
  window._fem=fem;
}

// ══ STEPS ══
function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i).style.display=i===n?'block':'none';
    const t=document.getElementById('st'+i);
    t.className='step'+(i===n?' active':i<n?' done':'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══ TEMPLATES ══
function renderTpls(){
  document.getElementById('tpl-list').innerHTML=TEMPLATES.map(t=>`
    <div class="tpl${t.id===selTpl?' sel':''}" onclick="selTemplate('${t.id}')">
      <div class="tpl-icon">${t.icon}</div>
      <div class="tpl-name">${t.name}</div>
      <div class="tpl-desc">${t.desc.replace(/\n/g,'<br/>')}</div>
    </div>`).join('');
}

function selTemplate(id){
  selTpl=id;
  renderTpls();
  document.getElementById('week-builder').style.display=id==='monthly'?'none':'block';
  document.getElementById('month-builder').style.display=id==='monthly'?'block':'none';
}

// ══ DAYS ══
function renderDays(){
  document.getElementById('days-grid').innerHTML=DAYS.map((d,i)=>`
    <div class="day-row" id="dr-${i}">
      <div class="day-hd" onclick="toggleDay(${i})">
        <span class="day-name">${d}</span>
        <span class="day-toggle${dayState[i].on?' on':''}" id="dt-${i}">${dayState[i].on?'✓':'+'}</span>
      </div>
      <div class="day-fields${dayState[i].on?' open':''}" id="df-${i}">
        <div class="day-type-tabs">
          ${DAY_TYPES.map(t=>`<span class="dtype${dayState[i].type===t.id?' on':''}" onclick="setDayType(${i},'${t.id}')" id="dty-${i}-${t.id}">${t.label}</span>`).join('')}
        </div>
        <div id="dfields-${i}">${buildDayFields(i)}</div>
      </div>
    </div>`).join('');
}

function buildDayFields(i){
  const s=dayState[i];
  if(s.type==='tathbit'||s.type==='exam'||s.type==='free'){
    return `<div class="fg"><label>نص إضافي (اختياري)</label>
      <input type="text" value="${s.note}" placeholder="مثال: تثبيت ما سبق" onchange="dayState[${i}].note=this.value"/></div>`;
  }
  let html='';
  if(s.type==='hifz'||s.type==='both'){
    html+=`<div class="fg"><label>الحفظ الجديد</label>
      <input type="text" value="${s.hifz}" placeholder="مثال: العنكبوت 1-10" onchange="dayState[${i}].hifz=this.value"/></div>`;
  }
  if(s.type==='muraja'||s.type==='both'){
    html+=`<div class="fg"><label>المراجعة</label>
      <input type="text" value="${s.muraja}" placeholder="مثال: مراجعة الروم" onchange="dayState[${i}].muraja=this.value"/></div>`;
  }
  if(selTpl==='weekly2'){
    html+=`<div class="fg"><label>التكرار</label>
      <input type="text" value="${s.repeat||'4 مرات'}" placeholder="4 مرات" onchange="dayState[${i}].repeat=this.value"/></div>`;
  }
  return html;
}

function toggleDay(i){
  dayState[i].on=!dayState[i].on;
  document.getElementById('dt-'+i).className='day-toggle'+(dayState[i].on?' on':'');
  document.getElementById('dt-'+i).textContent=dayState[i].on?'✓':'+';
  const f=document.getElementById('df-'+i);
  f.className='day-fields'+(dayState[i].on?' open':'');
}

function toggleAllDays(on){
  DAYS.forEach((_,i)=>{
    dayState[i].on=on;
    document.getElementById('dt-'+i).className='day-toggle'+(on?' on':'');
    document.getElementById('dt-'+i).textContent=on?'✓':'+';
    document.getElementById('df-'+i).className='day-fields'+(on?' open':'');
  });
}

function setDayType(i,type){
  dayState[i].type=type;
  DAY_TYPES.forEach(t=>{
    const el=document.getElementById(`dty-${i}-${t.id}`);
    if(el) el.className='dtype'+(t.id===type?' on':'');
  });
  document.getElementById(`dfields-${i}`).innerHTML=buildDayFields(i);
}

// ══ SPECIALS ══
function addSpecial(){
  specials.push({text:'', color:'#fde8d8', textColor:'#c9972a'});
  renderSpecials();
}

function renderSpecials(){
  document.getElementById('special-rows').innerHTML=specials.map((s,i)=>`
    <div class="special-row" style="background:${s.color};">
      <input type="text" value="${s.text}" placeholder="مثال: الجمعة — سورة الكهف فقط" 
        style="background:transparent;border-color:rgba(0,0,0,.1);"
        onchange="specials[${i}].text=this.value"/>
      <select onchange="setSpecialColor(${i},this.value)" style="width:90px;background:transparent;border-color:rgba(0,0,0,.1);font-size:11px;">
        <option value="gold" ${s.color==='#fde8d8'?'selected':''}>ذهبي</option>
        <option value="green" ${s.color==='#e8f5f0'?'selected':''}>أخضر</option>
        <option value="orange" ${s.color==='#fde8d8'?'':''}>برتقالي</option>
        <option value="blue" ${s.color==='#ddeef8'?'selected':''}>أزرق</option>
        <option value="pink" ${s.color==='#fde8e8'?'selected':''}>وردي</option>
      </select>
      <button class="btn xs danger" onclick="specials.splice(${i},1);renderSpecials()">✕</button>
    </div>`).join('');
}

function setSpecialColor(i,val){
  const map={gold:['#fde8d8','#c9972a'],green:['#e8f5f0','#0f5442'],orange:['#fde8d8','#d4651a'],blue:['#ddeef8','#1a5f8a'],pink:['#fde8e8','#c0392b']};
  [specials[i].color, specials[i].textColor]=map[val]||map.gold;
  renderSpecials();
}

// ══ BUILD PREVIEW ══
function buildAndPreview(){
  const rows=buildRows();
  if(!rows.length){toast('أضف يوماً واحداً على الأقل','terr');return;}
  planRows=rows;
  renderPreview(rows);
  goStep(3);
}

function buildRows(){
  const rows=[];
  const isWeekly2=selTpl==='weekly2';

  DAYS.forEach((d,i)=>{
    const s=dayState[i];
    if(!s.on) return;

    // Check for specials BEFORE this day
    specials.forEach(sp=>{
      if(sp.text) rows.push({type:'span', text:sp.text, color:sp.color, textColor:sp.textColor});
    });

    if(s.type==='tathbit'||s.type==='exam'||s.type==='free'){
      const label={tathbit:'تثبيت',exam:'اختبار',free:'إجازة'}[s.type];
      rows.push({type:'span', text:d+' — '+(s.note||label), color:'#fde8d8', textColor:'#d4651a'});
    } else {
      rows.push({type:'day', day:d, hifz:s.hifz, muraja:s.muraja, repeat:s.repeat||'', note:s.note, dayType:s.type, isWeekly2});
    }
  });

  return rows;
}

function renderPreview(rows){
  const title=document.getElementById('s-title').value||'خطة الحفظ والمراجعة';
  const name=document.getElementById('s-name').value||'—';
  const teacher=document.getElementById('s-teacher').value||'';
  const halaqa=document.getElementById('s-halaqa').value||'';
  const date=document.getElementById('s-date').value||'';
  const f=window._fem!==false;
  const isW2=selTpl==='weekly2';

  let html=`<div style="padding:14px 16px;border-bottom:1px solid var(--border);">
    <div style="font-size:15px;font-weight:800;color:var(--gd);margin-bottom:8px;">${title}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);">
      <span>👤 ${name}</span>
      ${teacher?`<span>${f?'👩‍🏫':'👨‍🏫'} ${teacher}</span>`:''}
      ${halaqa?`<span>📚 ${halaqa}</span>`:''}
      ${date?`<span>📅 ${date}</span>`:''}
    </div>
  </div>
  <div class="preview-wrap">
  <table class="plan-tbl">
    <thead><tr>
      <th style="width:28px;">#</th>
      <th>اليوم</th>
      <th>الحفظ الجديد</th>
      <th>المراجعة</th>
      ${isW2?'<th style="width:70px;">التكرار</th>':''}
      <th style="width:70px;">التوقيع</th>
    </tr></thead>
    <tbody>`;

  let n=0;
  rows.forEach(r=>{
    if(r.type==='span'){
      const cols=3+(isW2?1:0)+2;
      html+=`<tr class="span-r"><td colspan="${cols}" style="background:${r.color};color:${r.textColor};">${r.text}</td></tr>`;
    } else {
      n++;
      const hifz=r.hifz||'—';
      const muraja=r.muraja||'—';
      html+=`<tr>
        <td class="num-col">${n}</td>
        <td class="day-col">${r.day}</td>
        <td>${r.dayType==='muraja'?'—':hifz}</td>
        <td>${r.dayType==='hifz'?'—':muraja}</td>
        ${isW2?`<td style="text-align:center;">${r.repeat||'—'}</td>`:''}
        <td class="sig-col"></td>
      </tr>`;
    }
  });

  html+=`</tbody></table></div>
  <div style="padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:11px;color:var(--muted);">
    <span>${f?'توقيع الطالبة':'توقيع الطالب'}: ________________</span>
    <span>${f?'توقيع المعلمة':'توقيع المعلم'}: ________________</span>
  </div>`;

  document.getElementById('preview-title').textContent='📋 '+title;
  document.getElementById('preview-wrap').innerHTML=html;
}

// ══ PRINT ══

  document.getElementById('exp-modal').classList.add('open');
}

</style></head><body>

<div class="info">
  <div class="ii"><div class="l">${f?'الطالبة':'الطالب'}</div><div class="v">${name}</div></div>

// ══ SAVE / LOAD ══
function savePlan(){
  const data={
    v:5, gender:document.querySelector('input[name=g]:checked').value,
    name:document.getElementById('s-name').value,
    teacher:document.getElementById('s-teacher').value,
    halaqa:document.getElementById('s-halaqa').value,
    date:document.getElementById('s-date').value,
    title:document.getElementById('s-title').value,
    tpl:selTpl, dayState, specials,
    at:new Date().toLocaleString('ar-BH')
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='خطة_'+(data.name||'unnamed').replace(/\s/g,'_')+'.json'; a.click();
  URL.revokeObjectURL(url);
  toast('✅ تم حفظ الملف','tok');
}

function loadPlan(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      const gi=document.querySelector(`input[name=g][value="${d.gender||'f'}"]`);
      if(gi){gi.checked=true;upd();}
      ['name','teacher','halaqa','date','title'].forEach(k=>{
        const el=document.getElementById('s-'+k); if(el) el.value=d[k]||'';
      });
      if(d.dayState) dayState=d.dayState;
      if(d.specials) specials=d.specials;
      selTpl=d.tpl||'weekly';
      renderTpls(); renderDays(); renderSpecials();
      goStep(2);
      toast('✅ تم فتح الخطة','tok');
    }catch{toast('❌ الملف غير صحيح','terr');}
  };
  reader.readAsText(file); event.target.value='';
}

// ══ TOAST ══
function toast(msg,cls='tok',ms=3000){
  const c=document.getElementById('tc');
  const t=document.createElement('div');
  t.className='toast '+cls; t.textContent=msg;
  c.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},ms);
}

init();
