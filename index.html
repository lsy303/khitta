<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>خطة الحفظ والمراجعة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1a7a5e;--green-dark:#0f5442;--green-light:#e8f5f0;
  --gold:#c9972a;--gold-light:#fdf3dc;--gold-border:#e8d5a0;
  --orange:#d4651a;--orange-light:#fde8d8;
  --gray:#f5f4f0;--border:#e2dfd8;--text:#1a1a1a;--muted:#888078;--white:#fff;
  --r:10px;--r-lg:16px;--shadow:0 2px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}

/* TOP BAR */
.topbar{background:linear-gradient(135deg,var(--green-dark),var(--green));height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(15,84,66,.3);}
.tb-brand{display:flex;align-items:center;gap:8px;}
.tb-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.tb-title{color:#fff;font-size:14px;font-weight:800;}
.tb-sub{color:rgba(255,255,255,.65);font-size:10px;}
.tb-actions{display:flex;gap:6px;}
.tb-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 11px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .12s;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.28);}
.tb-btn.gold{background:var(--gold);border-color:#a87d20;}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:14px 12px 80px;}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:12px;box-shadow:var(--shadow);}
.card-hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:13px;font-weight:700;color:var(--green-dark);display:flex;align-items:center;gap:6px;}
.card-body{padding:14px 16px;}

/* STEPS */
.steps{display:flex;gap:0;margin-bottom:16px;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.step{flex:1;padding:10px 8px;text-align:center;font-size:11px;font-weight:600;color:var(--muted);background:var(--white);cursor:pointer;transition:all .15s;border-left:1px solid var(--border);}
.step:last-child{border-left:none;}
.step.active{background:var(--green);color:#fff;}
.step.done{background:var(--green-light);color:var(--green-dark);}
.step-num{display:block;font-size:16px;font-weight:800;margin-bottom:2px;}

/* FORM */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fgrid.full{grid-template-columns:1fr;}
.fg label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px;font-weight:600;}
input[type=text],textarea,select{font-family:'Tajawal',sans-serif;font-size:13px;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--white);color:var(--text);width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,122,94,.1);}

/* GENDER TOGGLE */
.gender-row{display:flex;background:var(--gray);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:14px;}
.gender-opt{flex:1;}
.gender-opt input{display:none;}
.gender-opt label{display:block;padding:8px;border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;}
.gender-opt input:checked + label{background:var(--white);color:var(--green-dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* TEMPLATE PICKER */
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.tpl-card{padding:12px;border:2px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;background:var(--white);}
.tpl-card:hover{border-color:var(--green);background:var(--green-light);}
.tpl-card.sel{border-color:var(--green);background:var(--green-light);}
.tpl-card .ti{font-size:22px;margin-bottom:5px;}
.tpl-card .tn{font-size:12px;font-weight:700;color:var(--green-dark);}
.tpl-card .td{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.5;}

/* COLUMN CONFIGURATOR */
.col-config{background:var(--gray);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.col-config-title{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px;}
.col-tags{display:flex;flex-wrap:wrap;gap:6px;}
.col-tag{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .12s;user-select:none;}
.col-tag.on{background:var(--green);border-color:var(--green-dark);color:#fff;}
.col-tag .remove{font-size:10px;opacity:.7;}
.col-add{padding:5px 10px;border-radius:99px;font-size:12px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;}
.col-add:hover{border-color:var(--green);color:var(--green);}

/* ROW CONFIG */
.row-config{background:var(--gray);border-radius:var(--r);padding:12px;margin-bottom:12px;}
.row-num-row{display:flex;align-items:center;gap:10px;}
.num-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.num-btn:hover{background:var(--green-light);border-color:var(--green);}
.num-display{font-size:20px;font-weight:800;color:var(--green-dark);min-width:32px;text-align:center;}

/* BUILT TABLE */
.plan-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
#plan-table{width:100%;border-collapse:collapse;min-width:420px;table-layout:auto;}
#plan-table th{background:var(--green-dark);color:#fff;padding:9px 6px;font-size:12px;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,.15);white-space:nowrap;min-width:70px;}
#plan-table th.editable-th{cursor:pointer;}
#plan-table th.editable-th:hover{background:#0a3d2e;}
#plan-table th input{background:transparent;border:none;color:#fff;font-weight:700;font-size:12px;outline:none;width:100%;text-align:center;font-family:'Tajawal',sans-serif;}
#plan-table th input::placeholder{color:rgba(255,255,255,.5);}
#plan-table td{border:1px solid var(--border);padding:0;vertical-align:middle;}
#plan-table td.num-cell{background:#f8f7f4;width:36px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:8px 4px;}
#plan-table td.data-cell input{width:100%;min-width:65px;padding:8px 7px;border:none;font-family:'Tajawal',sans-serif;font-size:13px;background:transparent;outline:none;}
#plan-table td.data-cell input:focus{background:rgba(26,122,94,.06);}
#plan-table tr:nth-child(even) td{background:#fafaf8;}
#plan-table tr:nth-child(even) td input{background:transparent;}
#plan-table tr:nth-child(even) td input:focus{background:rgba(26,122,94,.06);}

/* SPAN ROW */
#plan-table tr.span-row td{padding:0;}
#plan-table tr.span-row td input{font-weight:800;font-size:13px;text-align:center;padding:10px;width:100%;border:none;background:transparent;}
#plan-table tr.span-row{cursor:pointer;}

/* COLOR BAR */
.color-bar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--border);background:#fafaf8;}
.color-bar-label{font-size:10px;color:var(--muted);font-weight:600;margin-left:4px;}
.sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0;}
.sw:hover,.sw.sel{transform:scale(1.2);border-color:#333;}
.sw.none{background:var(--white)!important;border:2px solid var(--border)!important;font-size:9px;display:flex;align-items:center;justify-content:center;color:var(--muted);}

/* QUICK ACTIONS BAR */
.quick-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--border);background:#fafaf8;}

/* BUTTONS */
.btn{font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;padding:8px 14px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;}
.btn:hover{background:var(--gray);}
.btn.primary{background:var(--green);border-color:var(--green-dark);color:#fff;}
.btn.primary:hover{background:var(--green-dark);}
.btn.gold{background:var(--gold);border-color:#a87d20;color:#fff;}
.btn.danger{color:#c0392b;border-color:#f0b0b0;}
.btn.sm{font-size:11px;padding:5px 10px;}
.btn.xs{font-size:11px;padding:3px 7px;}
.btn:disabled{opacity:.35;cursor:default;}

/* NAV BUTTONS */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none;}
.toast{padding:9px 18px;border-radius:99px;font-size:12px;color:#fff;font-family:'Tajawal',sans-serif;opacity:0;transform:translateY(16px);transition:all .25s;box-shadow:0 4px 14px rgba(0,0,0,.2);white-space:nowrap;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{background:var(--green-dark);}
.toast.err{background:#c0392b;}
.toast.inf{background:#1a5f8a;}

/* EXPORT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r-lg);padding:22px;width:320px;max-width:94vw;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--green-dark);}
.modal-opts{display:flex;flex-direction:column;gap:8px;}

@media(max-width:480px){.fgrid{grid-template-columns:1fr;}.tpl-grid{grid-template-columns:1fr;}}

/* ── TRACKING ── */
.mode-toggle{display:flex;background:var(--gray);border-radius:var(--r);padding:3px;gap:3px;margin-bottom:12px;}
.mode-opt{flex:1;}
.mode-opt input{display:none;}
.mode-opt label{display:block;padding:8px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;text-align:center;}
.mode-opt input:checked + label{background:var(--white);color:var(--green-dark);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* PROGRESS BAR */
.progress-wrap{padding:12px 16px;background:var(--green-light);border-bottom:1px solid var(--border);}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-title{font-size:12px;font-weight:700;color:var(--green-dark);}
.progress-pct{font-size:18px;font-weight:800;color:var(--green-dark);}
.progress-bar{height:8px;background:#c8e6db;border-radius:99px;overflow:hidden;}
.progress-fill{height:8px;background:var(--green);border-radius:99px;transition:width .4s ease;}
.progress-stats{display:flex;gap:12px;margin-top:6px;}
.ps-item{font-size:11px;color:var(--green-dark);}

/* ROW TRACK PANEL */
.track-panel{background:var(--green-light);border-top:1px solid var(--border);padding:8px 10px;display:none;}
.track-panel.show{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.check-btn{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.check-btn.done{background:var(--green);border-color:var(--green-dark);color:#fff;}
.stars{display:flex;gap:2px;}
.star{font-size:18px;cursor:pointer;opacity:.3;transition:opacity .1s;line-height:1;}
.star.lit{opacity:1;}
.track-note{flex:1;min-width:80px;font-family:'Tajawal',sans-serif;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--white);outline:none;}
.track-note:focus{border-color:var(--green);}

/* ROW STATUS INDICATOR */
#plan-table tr.row-done td{background:#f0faf5!important;}
#plan-table tr.row-done td input{background:transparent!important;}
#plan-table tr.row-partial td{background:#fffdf0!important;}
#plan-table tr.row-partial td input{background:transparent!important;}
.row-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:4px;flex-shrink:0;}

@media print{.no-print{display:none!important;}.topbar,.quick-bar,.color-bar,.nav-row,.steps{display:none!important;}body{background:#fff;}.card{box-shadow:none;border:none;}*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar no-print">
  <div class="tb-brand">
    <div class="tb-icon">📖</div>
    <div>
      <div class="tb-title">خطة الحفظ والمراجعة</div>
      <div class="tb-sub">صمّم خطتك الخاصة</div>
    </div>
  </div>
  <div class="tb-actions">
    <button class="tb-btn" onclick="savePlan()">⬇ حفظ</button>
    <label class="tb-btn" style="cursor:pointer;">⬆ فتح<input type="file" accept=".json" onchange="loadPlan(event)" style="display:none"/></label>
    <button class="tb-btn gold" onclick="openExport()">🖨 تصدير</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-bg" id="export-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <h3>🖨 تصدير الخطة</h3>
    <div class="modal-opts">
      <button class="btn primary" onclick="doPrint('p');document.getElementById('export-modal').classList.remove('open')" style="justify-content:center;">📄 طباعة / PDF عمودي</button>
      <button class="btn" onclick="doPrint('l');document.getElementById('export-modal').classList.remove('open')" style="justify-content:center;">📋 طباعة / PDF أفقي</button>
      <button class="btn gold" onclick="doShare();document.getElementById('export-modal').classList.remove('open')" style="justify-content:center;">📲 مشاركة (Screenshot)</button>
    </div>
    <button class="btn" style="width:100%;justify-content:center;margin-top:10px;" onclick="document.getElementById('export-modal').classList.remove('open')">إغلاق</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toast-wrap"></div>

<div class="main">

<!-- STEP INDICATOR -->
<div class="steps no-print" id="steps">
  <div class="step active" id="step1-tab" onclick="goStep(1)"><span class="step-num">1</span>البيانات</div>
  <div class="step" id="step2-tab" onclick="goStep(2)"><span class="step-num">2</span>القالب</div>
  <div class="step" id="step3-tab" onclick="goStep(3)"><span class="step-num">3</span>الخطة</div>
</div>

<!-- ════ STEP 1: INFO ════ -->
<div id="step1">
  <div class="card">
    <div class="card-hd"><div class="card-hd-title">👤 بيانات الخطة</div><div id="save-status" style="font-size:11px;color:var(--green-dark);font-weight:600;"></div></div>
    <div class="card-body">
      <div class="gender-row">
        <div class="gender-opt"><input type="radio" name="g" id="gf" value="f" checked onchange="updateLabels()"/><label for="gf">👩 طالبة / معلمة</label></div>
        <div class="gender-opt"><input type="radio" name="g" id="gm" value="m" onchange="updateLabels()"/><label for="gm">👨 طالب / معلم</label></div>
      </div>
      <div class="fgrid">
        <div class="fg"><label id="lbl-s">اسم الطالبة</label><input type="text" id="s-name" placeholder="الاسم الكامل"/></div>
        <div class="fg"><label id="lbl-t">المعلمة</label><input type="text" id="s-teacher" placeholder="الاسم"/></div>
        <div class="fg"><label>الحلقة / الفصل</label><input type="text" id="s-halaqa" placeholder="اسم الحلقة"/></div>
        <div class="fg"><label>الفترة / التاريخ</label><input type="text" id="s-date" placeholder="مثال: يونيو 2025"/></div>
      </div>
      <div class="fg fgrid full"><label>عنوان الخطة</label><input type="text" id="s-title" placeholder="مثال: خطة حفظ جزء عم — الفصل الأول"/></div>

      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn primary sm" onclick="savePlan()">⬇ حفظ كملف</button>
        <label class="btn sm" style="cursor:pointer;">⬆ فتح ملف<input type="file" accept=".json" onchange="loadPlan(event)" style="display:none"/></label>
      </div>
    </div>
  </div>
  <div class="nav-row no-print">
    <div></div>
    <button class="btn primary" onclick="goStep(2)">التالي: اختر القالب ←</button>
  </div>
</div>

<!-- ════ STEP 2: TEMPLATE ════ -->
<div id="step2" style="display:none;">
  <div class="card">
    <div class="card-hd"><div class="card-hd-title">📋 اختر قالب الخطة</div></div>
    <div class="card-body">
      <div class="tpl-grid" id="tpl-grid">
        <!-- filled by JS -->
      </div>

      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
        <div class="col-config">
          <div class="col-config-title">✏️ تخصيص الأعمدة — اضغط لإضافة أو حذف</div>
          <div class="col-tags" id="col-tags"></div>
        </div>

        <div class="row-config">
          <div class="col-config-title" style="margin-bottom:10px;">📏 عدد الصفوف</div>
          <div class="row-num-row">
            <button class="num-btn" onclick="changeRows(-1)">−</button>
            <span class="num-display" id="rows-display">6</span>
            <button class="num-btn" onclick="changeRows(1)">+</button>
            <span style="font-size:12px;color:var(--muted);margin-right:8px;">صف</span>
            <button class="btn sm" onclick="changeRows(7)" style="margin-right:auto;">+ أسبوع</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-row no-print">
    <button class="btn" onclick="goStep(1)">← السابق</button>
    <button class="btn primary" onclick="buildAndGo()">بناء الخطة ←</button>
  </div>
</div>

<!-- ════ STEP 3: PLAN ════ -->
<div id="step3" style="display:none;">
  <div class="card">
    <div class="card-hd">
      <div class="card-hd-title" id="plan-card-title">📋 الخطة</div>
      <div style="display:flex;gap:6px;" class="no-print">
        <button class="btn xs" id="add-row-btn" onclick="addRow()">+ صف</button>
        <button class="btn xs" id="add-span-btn" onclick="addSpanRow()">↔ عنوان</button>
        <button class="btn xs danger" onclick="undoLast()" id="undo-btn" disabled>↩</button>
      </div>
    </div>

    <!-- MODE TOGGLE -->
    <div class="card-body" style="padding:10px 16px;border-bottom:1px solid var(--border);" id="mode-wrap">
      <div class="mode-toggle">
        <div class="mode-opt">
          <input type="radio" name="mode" id="mode-build" value="build" checked onchange="switchMode('build')"/>
          <label for="mode-build">✏️ بناء الخطة</label>
        </div>
        <div class="mode-opt">
          <input type="radio" name="mode" id="mode-track" value="track" onchange="switchMode('track')"/>
          <label for="mode-track">📊 تتبع الإنجاز</label>
        </div>
      </div>
    </div>

    <!-- PROGRESS (track mode only) -->
    <div class="progress-wrap" id="progress-wrap" style="display:none;">
      <div class="progress-header">
        <div class="progress-title">📈 تقدم الخطة</div>
        <div class="progress-pct" id="prog-pct">0%</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="progress-stats">
        <span class="ps-item">✅ <span id="prog-done">0</span> مكتمل</span>
        <span class="ps-item">⭐ معدل التقييم: <span id="prog-avg">—</span></span>
        <span class="ps-item">📋 <span id="prog-total">0</span> إجمالي</span>
      </div>
    </div>

    <!-- COLOR BAR -->
    <div class="color-bar no-print">
      <span class="color-bar-label">لون الخانة:</span>
      <div class="sw none sel" id="sw0" onclick="selColor(0,'')">∅</div>
      <div class="sw sel" id="sw1" style="background:#fdf3dc;" onclick="selColor(1,'#fdf3dc')"></div>
      <div class="sw" id="sw2" style="background:#fde8d8;" onclick="selColor(2,'#fde8d8')"></div>
      <div class="sw" id="sw3" style="background:#d4651a;" onclick="selColor(3,'#d4651a')"></div>
      <div class="sw" id="sw4" style="background:#fde8e8;" onclick="selColor(4,'#fde8e8')"></div>
      <div class="sw" id="sw5" style="background:#e8f5f0;" onclick="selColor(5,'#e8f5f0')"></div>
      <div class="sw" id="sw6" style="background:#ddeef8;" onclick="selColor(6,'#ddeef8')"></div>
      <div class="sw" id="sw7" style="background:#f0e6f8;" onclick="selColor(7,'#f0e6f8')"></div>
      <div class="sw" id="sw8" style="background:#fff9c4;" onclick="selColor(8,'#fff9c4')"></div>
      <div class="sw" id="sw9" style="background:#e8e8e8;" onclick="selColor(9,'#e8e8e8')"></div>
      <button class="btn sm" onclick="applyColorToLast()" style="margin-right:auto;" id="apply-color-btn">✅ لوّن الخانة المحددة</button>
    </div>

    <!-- TABLE -->
    <div class="plan-wrap">
      <table id="plan-table">
        <thead><tr id="t-head"></tr></thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>

    <!-- NOTES -->
    <div style="padding:10px 14px;border-top:1px solid var(--border);">
      <textarea id="s-notes" placeholder="ملاحظات..." rows="2" style="border:none;background:transparent;resize:none;font-size:12px;color:var(--muted);padding:0;box-shadow:none;width:100%;outline:none;"></textarea>
    </div>
  </div>

  <div class="nav-row no-print">
    <button class="btn" onclick="goStep(2)">← تعديل القالب</button>
    <button class="btn gold" onclick="openExport()">🖨 تصدير</button>
  </div>
</div>

</div><!-- end main -->

<script>
// ══ STATE ══
let cols = [];        // [{id,name}]
let rowCount = 6;
let selBg = '';
let history = [];
let MAX_HIST = 25;
const SAVE_KEY = 'khitta_v4';

// ══ TEMPLATES ══
const TEMPLATES = [
  {
    id:'weekly',
    icon:'🗓',
    name:'خطة أسبوعية',
    desc:'السبت — الخميس\nحفظ + مراجعة يومية',
    cols:['اليوم','الحفظ الجديد','المراجعة','ملاحظة'],
    rows:6,
    autoFill: (r) => ['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس'][r] || ''
  },
  {
    id:'detailed',
    icon:'📖',
    name:'خطة تفصيلية',
    desc:'مع التكرار والصفحات\nوخانة الاكتمال',
    cols:['التاريخ','اليوم','الحفظ','الصفحات','التكرار','المراجعة','✅'],
    rows:7
  },
  {
    id:'monthly',
    icon:'📆',
    name:'خطة شهرية',
    desc:'مقسمة بالتواريخ\nمع الهدف الأسبوعي',
    cols:['التاريخ','اليوم','الحفظ','المراجعة'],
    rows:28
  },
  {
    id:'exam',
    icon:'🎤',
    name:'خطة تسميع',
    desc:'للمراجعة والتسميع\nقبل الاختبار',
    cols:['التاريخ','السورة / الجزء','التسميع','الملاحظات','✅'],
    rows:8
  },
  {
    id:'custom',
    icon:'✨',
    name:'خطة مخصصة',
    desc:'ابدأ من صفر\nوخصص كل شيء',
    cols:['اليوم','المطلوب'],
    rows:6
  }
];

const COL_PRESETS = ['التاريخ','اليوم','الحفظ الجديد','المراجعة','التكرار','التسميع','الصفحات','ملاحظة','✅ اكتمل','السورة','الجزء'];

let selectedTpl = TEMPLATES[0];

// ══ INIT ══
function init(){
  renderTemplates();
  selectTemplate(TEMPLATES[0]);
  updateLabels();
}

// ══ STEPS ══
function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('step'+i).style.display = i===n?'block':'none';
    const tab = document.getElementById('step'+i+'-tab');
    tab.className = 'step' + (i===n?' active':i<n?' done':'');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══ LABELS ══
function updateLabels(){
  const f = document.querySelector('input[name=g]:checked').value==='f';
  document.getElementById('lbl-s').textContent = f?'اسم الطالبة':'اسم الطالب';
  document.getElementById('lbl-t').textContent = f?'المعلمة':'المعلم';
  window._fem = f;
}
window._fem = true;

// ══ TEMPLATES RENDER ══
function renderTemplates(){
  document.getElementById('tpl-grid').innerHTML = TEMPLATES.map(t=>`
    <div class="tpl-card${t.id===selectedTpl.id?' sel':''}" onclick="selectTemplate(TEMPLATES.find(x=>x.id==='${t.id}'))">
      <div class="ti">${t.icon}</div>
      <div class="tn">${t.name}</div>
      <div class="td">${t.desc.replace(/\n/g,'<br/>')}</div>
    </div>`).join('');
}

function selectTemplate(tpl){
  selectedTpl = tpl;
  cols = tpl.cols.map((c,i)=>({id:'c'+i,name:c}));
  rowCount = tpl.rows;
  document.getElementById('rows-display').textContent = rowCount;
  renderColTags();
  renderTemplates();
}

// ══ COLUMN TAGS ══
function renderColTags(){
  const wrap = document.getElementById('col-tags');
  wrap.innerHTML = cols.map((c,i)=>`
    <span class="col-tag on" onclick="removeCol(${i})">
      ${c.name} <span class="remove">✕</span>
    </span>`).join('') +
    COL_PRESETS.filter(p=>!cols.find(c=>c.name===p)).map(p=>`
    <span class="col-tag" onclick="addColPreset('${p}')">${p} +</span>`).join('') +
    `<button class="col-add" onclick="addCustomCol()">+ إضافة عمود...</button>`;
}

function removeCol(i){
  if(cols.length<=1){toast('يجب أن يكون هناك عمود واحد على الأقل','err');return;}
  cols.splice(i,1); renderColTags();
}

function addColPreset(name){
  cols.push({id:'c'+Date.now(),name}); renderColTags();
}

function addCustomCol(){
  const name = prompt('اسم العمود الجديد:');
  if(!name||!name.trim()) return;
  cols.push({id:'c'+Date.now(),name:name.trim()}); renderColTags();
}

function changeRows(n){
  rowCount = Math.max(1, Math.min(60, rowCount+n));
  document.getElementById('rows-display').textContent = rowCount;
}

// ══ BUILD TABLE ══
function buildAndGo(){
  if(!cols.length){toast('أضف عموداً على الأقل','err');return;}
  buildTable();
  goStep(3);
}

function buildTable(){
  saveHistory();
  // Header
  const thead = document.getElementById('t-head');
  thead.innerHTML = '<th style="width:32px;background:var(--green-dark);border:1px solid rgba(255,255,255,.15);">#</th>' +
    cols.map(c=>`<th class="editable-th"><input type="text" value="${esc(c.name)}" placeholder="عمود" title="اضغط للتعديل"/></th>`).join('');

  // Body
  const tbody = document.getElementById('t-body');
  tbody.innerHTML = '';
  for(let r=0; r<rowCount; r++){
    const tr = document.createElement('tr');
    tr.dataset.r = r;
    // Row number cell
    let html = `<td class="num-cell">${r+1}</td>`;
    cols.forEach((c,ci)=>{
      const autoVal = (ci===0 && selectedTpl.autoFill) ? selectedTpl.autoFill(r) : '';
      html += `<td class="data-cell"><input type="text" value="${autoVal}" placeholder=""/></td>`;
    });
    tr.innerHTML = html;
    tbody.appendChild(tr);
  }

  // Click on data-cell td to color
  document.querySelectorAll('#plan-table td.data-cell').forEach(td=>{
    td.addEventListener('focusin', ()=>{ 
      lastFocusedTd=td; 
      td.style.outline='1px solid var(--green)';
    });
    td.addEventListener('focusout', ()=>{
      setTimeout(()=>{ if(lastFocusedTd===td) td.style.outline=''; },200);
    });
  });

  updatePlanTitle();
  attachTrackPanels();
  trackData = {};
}


function updatePlanTitle(){
  const title = document.getElementById('s-title').value || document.getElementById('s-name').value || 'الخطة';
  document.getElementById('plan-card-title').textContent = '📋 ' + title;
}

// ══ ROWS ══
function saveHistory(){
  history.push(document.getElementById('t-body').innerHTML);
  if(history.length>MAX_HIST) history.shift();
  document.getElementById('undo-btn').disabled = false;
}

function undoLast(){
  if(!history.length) return;
  document.getElementById('t-body').innerHTML = history.pop();
  reattachColorHandlers();
  attachTrackPanels();
  if(trackMode==='track') switchMode('track');
  document.getElementById('undo-btn').disabled = history.length===0;
}

function reattachColorHandlers(){
  document.querySelectorAll('#plan-table td.data-cell').forEach(td=>{
    td.addEventListener('focusin',()=>{ lastFocusedTd=td; td.style.outline='1px solid var(--green)'; });
    td.addEventListener('focusout',()=>{ setTimeout(()=>{ if(lastFocusedTd===td) td.style.outline=''; },200); });
  });
}

function addRow(){
  saveHistory();
  const tbody = document.getElementById('t-body');
  const r = tbody.querySelectorAll('tr').length;
  const tr = document.createElement('tr');
  tr.dataset.r = r;
  let html = `<td class="num-cell">${r+1}</td>`;
  cols.forEach(()=>{ html += `<td class="data-cell"><input type="text" placeholder=""/></td>`; });
  tr.innerHTML = html;
  tbody.appendChild(tr);
  tr.querySelectorAll('td.data-cell').forEach(td=>{
    td.addEventListener('focusin',()=>{ lastFocusedTd=td; td.style.outline='1px solid var(--green)'; });
    td.addEventListener('focusout',()=>{ setTimeout(()=>{ if(lastFocusedTd===td) td.style.outline=''; },200); });
  });
  // Scroll to new row
  tr.scrollIntoView({behavior:'smooth',block:'center'});
  addTrackPanel(tr, parseInt(tr.dataset.r));
  if(trackMode==='track') document.getElementById('tp-'+parseInt(tr.dataset.r))?.classList.add('show');
}

function addSpanRow(){
  saveHistory();
  const tbody = document.getElementById('t-body');
  const r = tbody.querySelectorAll('tr').length;
  const bg = selBg || '#fde8d8';
  const tc = (selBg==='#d4651a'||selBg==='') ? (selBg?'#fff':'#d4651a') : '#1a1a1a';
  const tr = document.createElement('tr');
  tr.className = 'span-row';
  tr.dataset.r = r;
  tr.innerHTML = `<td colspan="${cols.length+1}" style="background:${bg};">
    <input type="text" placeholder="✦ اكتب عنوان أو ملاحظة هنا (مثال: الجمعة — سورة الكهف)" style="color:${tc};font-weight:800;"/>
  </td>`;
  tbody.appendChild(tr);
  tr.querySelector('input').focus();
  tr.scrollIntoView({behavior:'smooth',block:'center'});
}

// ══ COLOR ══
let lastFocusedTd = null;

function selColor(idx, color){
  document.querySelectorAll('.sw').forEach(s=>s.classList.remove('sel'));
  document.getElementById('sw'+idx).classList.add('sel');
  selBg = color;
}

function applyColor(td){
  if(selBg==='') td.style.background='';
  else td.style.background=selBg;
  const inp=td.querySelector('input');
  if(inp&&selBg==='#d4651a') inp.style.color='#fff';
  else if(inp) inp.style.color='';
  td.style.outline='2px solid var(--green)';
  setTimeout(()=>td.style.outline='',500);
}

function applyColorToLast(){
  if(!lastFocusedTd){ toast('اضغط داخل الخانة أولاً ثم اضغط هنا','inf'); return; }
  applyColor(lastFocusedTd);
}


// ══ TRACKING ══
let trackData = {}; // {rowIdx: {done:bool, stars:0-3, note:''}}
let trackMode = 'build';

function switchMode(mode){
  trackMode = mode;
  const isTrack = mode === 'track';

  // Show/hide progress bar
  document.getElementById('progress-wrap').style.display = isTrack ? 'block' : 'none';

  // Show/hide build buttons
  document.getElementById('add-row-btn').style.display = isTrack ? 'none' : '';
  document.getElementById('add-span-btn').style.display = isTrack ? 'none' : '';
  document.getElementById('undo-btn').style.display = isTrack ? 'none' : '';

  // Show/hide color bar
  document.querySelector('.color-bar').style.display = isTrack ? 'none' : '';

  // Show/hide track panels for each row
  document.querySelectorAll('.track-panel').forEach(p => {
    p.classList.toggle('show', isTrack);
  });

  // Make data cells readonly in track mode
  document.querySelectorAll('#plan-table td.data-cell input').forEach(inp => {
    inp.readOnly = isTrack;
  });

  if(isTrack) updateProgress();
}

function addTrackPanel(tr, rowIdx){
  const td = document.createElement('td');
  td.colSpan = cols.length + 1;
  td.style.padding = '0';

  const data = trackData[rowIdx] || {done:false, stars:0, note:''};

  td.innerHTML = `<div class="track-panel${trackMode==='track'?' show':''}" id="tp-${rowIdx}">
    <button class="check-btn${data.done?' done':''}" id="chk-${rowIdx}" onclick="toggleDone(${rowIdx})" title="${data.done?'اكتمل — اضغط للتراجع':'لم يكتمل بعد'}">
      ${data.done?'✅':'○'}
    </button>
    <div class="stars" id="stars-${rowIdx}">
      ${[1,2,3].map(s=>`<span class="star${s<=data.stars?' lit':''}" onclick="setStar(${rowIdx},${s})">⭐</span>`).join('')}
    </div>
    <input type="text" class="track-note" id="note-${rowIdx}" value="${data.note||''}" placeholder="ملاحظة..." oninput="setNote(${rowIdx},this.value)"/>
  </div>`;

  const panelRow = document.createElement('tr');
  panelRow.className = 'track-row no-print';
  panelRow.dataset.forRow = rowIdx;
  panelRow.appendChild(td);
  tr.after(panelRow);
}

function toggleDone(rowIdx){
  if(!trackData[rowIdx]) trackData[rowIdx]={done:false,stars:0,note:''};
  trackData[rowIdx].done = !trackData[rowIdx].done;
  const btn = document.getElementById('chk-'+rowIdx);
  btn.className = 'check-btn' + (trackData[rowIdx].done?' done':'');
  btn.textContent = trackData[rowIdx].done ? '✅' : '○';
  btn.title = trackData[rowIdx].done ? 'اكتمل — اضغط للتراجع' : 'لم يكتمل بعد';
  // Update row color
  const dataRow = document.querySelector(`#t-body tr[data-r="${rowIdx}"]`);
  if(dataRow){
    dataRow.classList.toggle('row-done', trackData[rowIdx].done);
    dataRow.classList.toggle('row-partial', !trackData[rowIdx].done && trackData[rowIdx].stars>0);
  }
  updateProgress();
}

function setStar(rowIdx, val){
  if(!trackData[rowIdx]) trackData[rowIdx]={done:false,stars:0,note:''};
  // Toggle: click same star again to clear
  trackData[rowIdx].stars = trackData[rowIdx].stars===val ? 0 : val;
  document.querySelectorAll(`#stars-${rowIdx} .star`).forEach((s,i)=>{
    s.classList.toggle('lit', i < trackData[rowIdx].stars);
  });
  const dataRow = document.querySelector(`#t-body tr[data-r="${rowIdx}"]`);
  if(dataRow) dataRow.classList.toggle('row-partial', !trackData[rowIdx].done && trackData[rowIdx].stars>0);
  updateProgress();
}

function setNote(rowIdx, val){
  if(!trackData[rowIdx]) trackData[rowIdx]={done:false,stars:0,note:''};
  trackData[rowIdx].note = val;
}

function updateProgress(){
  const rows = document.querySelectorAll('#t-body tr[data-r]:not(.span-row)');
  const total = rows.length;
  if(!total){ document.getElementById('prog-pct').textContent='—'; return; }
  let done=0, starsSum=0, starsCount=0;
  rows.forEach(tr=>{
    const idx = parseInt(tr.dataset.r);
    const d = trackData[idx];
    if(d&&d.done) done++;
    if(d&&d.stars>0){ starsSum+=d.stars; starsCount++; }
  });
  const pct = Math.round(done/total*100);
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-fill').style.background = pct>=80?'var(--green)':pct>=40?'var(--gold)':'var(--orange)';
  document.getElementById('prog-done').textContent = done;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-avg').textContent = starsCount>0 ? (starsSum/starsCount).toFixed(1)+' ⭐' : '—';
}

function attachTrackPanels(){
  // Remove old panels
  document.querySelectorAll('.track-row').forEach(r=>r.remove());
  // Add new ones for each data row
  document.querySelectorAll('#t-body tr[data-r]:not(.span-row)').forEach(tr=>{
    addTrackPanel(tr, parseInt(tr.dataset.r));
  });
}

// ══ SAVE / LOAD ══
function collectData(){
  const rows=[];
  document.querySelectorAll('#t-body tr').forEach(tr=>{
    const isSpan=tr.classList.contains('span-row');
    const rd={isSpan,cells:[]};
    if(isSpan){
      const td=tr.querySelector('td');
      rd.bg=td?.style.background||'';
      rd.val=tr.querySelector('input')?.value||'';
      rd.tc=tr.querySelector('input')?.style.color||'';
    } else {
      tr.querySelectorAll('td.data-cell').forEach(td=>{
        rd.cells.push({v:td.querySelector('input')?.value||'',bg:td.style.background||''});
      });
    }
    rows.push(rd);
  });
  const colNames=[];
  document.querySelectorAll('#t-head th input').forEach(inp=>colNames.push(inp.value));
  return {
    v:4, gender:document.querySelector('input[name=g]:checked').value,
    name:document.getElementById('s-name').value,
    teacher:document.getElementById('s-teacher').value,
    halaqa:document.getElementById('s-halaqa').value,
    date:document.getElementById('s-date').value,
    title:document.getElementById('s-title').value,
    notes:document.getElementById('s-notes').value,
    cols:cols, colNames, rows,
    at:new Date().toLocaleString('ar-BH'),
    trackData: JSON.parse(JSON.stringify(trackData))
  };
}

function savePlan(){
  const data=collectData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='خطة_'+(data.name||'unnamed').replace(/\s/g,'_')+'.json'; a.click();
  URL.revokeObjectURL(url);
  toast('✅ تم حفظ الملف');
  document.getElementById('save-status').textContent='محفوظ ✓';
  setTimeout(()=>document.getElementById('save-status').textContent='',3000);
}

function loadPlan(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.cols) throw 0;
      // Restore fields
      const gi=document.querySelector(`input[name=g][value="${d.gender||'f'}"]`);
      if(gi){gi.checked=true;updateLabels();}
      ['name','teacher','halaqa','date','title','notes'].forEach(k=>{
        const el=document.getElementById('s-'+k); if(el) el.value=d[k]||'';
      });
      cols=d.cols||[];
      rowCount=(d.rows||[]).length||6;
      // Rebuild table
      const thead=document.getElementById('t-head');
      thead.innerHTML='<th style="width:32px;background:var(--green-dark);border:1px solid rgba(255,255,255,.15);">#</th>'+
        cols.map(c=>`<th class="editable-th"><input type="text" value="${esc(c.name)}" placeholder="عمود"/></th>`).join('');
      const tbody=document.getElementById('t-body');
      tbody.innerHTML='';
      (d.rows||[]).forEach((rd,ri)=>{
        const tr=document.createElement('tr');
        if(rd.isSpan){
          tr.className='span-row';
          tr.innerHTML=`<td colspan="${cols.length+1}" style="background:${rd.bg||'#fde8d8'};"><input type="text" value="${esc(rd.val||'')}" style="color:${rd.tc||'#d4651a'};font-weight:800;"/></td>`;
        } else {
          let html=`<td class="num-cell">${ri+1}</td>`;
          rd.cells.forEach((c,ci)=>{
            html+=`<td class="data-cell" style="${c.bg?'background:'+c.bg+';':''}"><input type="text" value="${esc(c.v||'')}" placeholder=""/></td>`;
          });
          tr.innerHTML=html;
          tr.querySelectorAll('td.data-cell').forEach(td=>{
            td.addEventListener('focusin',()=>{ lastFocusedTd=td; td.style.outline='1px solid var(--green)'; });
            td.addEventListener('focusout',()=>{ setTimeout(()=>{ if(lastFocusedTd===td) td.style.outline=''; },200); });
          });
        }
        tbody.appendChild(tr);
      });
      trackData = d.trackData || {};
      // Restore track state visually
      setTimeout(()=>{
        attachTrackPanels();
        Object.entries(trackData).forEach(([idx,data])=>{
          const dataRow = document.querySelector(`#t-body tr[data-r="${idx}"]`);
          if(dataRow){
            dataRow.classList.toggle('row-done', data.done);
            dataRow.classList.toggle('row-partial', !data.done&&data.stars>0);
          }
        });
        updateProgress();
      },50);
      goStep(3);
      toast('✅ تم فتح الخطة');
    }catch{toast('❌ الملف غير صحيح','err');}
  };
  reader.readAsText(file); event.target.value='';
}

// ══ EXPORT ══
function openExport(){
  document.getElementById('export-modal').classList.add('open');
}

function buildDoc(forShare, pageCSS=''){
  const f=window._fem!==false;
  const lbl1=f?'توقيع الطالبة':'توقيع الطالب', lbl2=f?'توقيع المعلمة':'توقيع المعلم';
  const name=document.getElementById('s-name').value||'—';
  const teacher=document.getElementById('s-teacher').value||'';
  const halaqa=document.getElementById('s-halaqa').value||'';
  const date=document.getElementById('s-date').value||'';
  const title=document.getElementById('s-title').value||'خطة الحفظ والمراجعة';
  const notes=document.getElementById('s-notes').value||'';

  // Read header col names
  const hdrCols=[];
  document.querySelectorAll('#t-head th input').forEach(inp=>hdrCols.push(inp.value||''));

  const hdrHTML=hdrCols.map(c=>`<th style="background:#0f5442;color:#fff;padding:8px 10px;border:1px solid rgba(255,255,255,.2);font-size:12px;">${c}</th>`).join('');

  const bodyRows=[];
  document.querySelectorAll('#t-body tr').forEach((tr,i)=>{
    if(tr.classList.contains('span-row')){
      const val=tr.querySelector('input')?.value||'';
      const bg=tr.querySelector('td')?.style.background||'#fde8d8';
      const tc=tr.querySelector('input')?.style.color||'#d4651a';
      bodyRows.push(`<tr><td colspan="${hdrCols.length+1}" style="padding:10px 14px;border:1px solid #e0ddd5;background:${bg};font-weight:800;color:${tc};text-align:center;font-size:13px;">${val}</td></tr>`);
    } else {
      let cells=`<td style="padding:7px 8px;border:1px solid #e0ddd5;font-weight:700;color:#0f5442;text-align:center;width:32px;font-size:11px;">${i+1}</td>`;
      tr.querySelectorAll('td.data-cell').forEach(td=>{
        const val=td.querySelector('input')?.value||'';
        const bg=td.style.background?`background:${td.style.background};`:'';
        cells+=`<td style="padding:7px 10px;border:1px solid #e0ddd5;${bg}font-size:12px;">${val}</td>`;
      });
      bodyRows.push(`<tr style="background:${i%2===0?'#fff':'#f9f8f5'}">${cells}</tr>`);
    }
  });

  return `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',Tahoma,sans-serif;background:#fff;padding:14px;color:#1a1a1a;font-size:12px;}
.hdr{background:linear-gradient(135deg,#0f5442,#1a7a5e);color:#fff;border-radius:8px;padding:14px;text-align:center;margin-bottom:12px;}
.hdr h1{font-size:16px;font-weight:800;margin-bottom:2px;}
.hdr .s{font-size:11px;opacity:.8;}
.info{display:flex;gap:14px;flex-wrap:wrap;background:#f5f4f0;border-radius:6px;padding:8px 12px;margin-bottom:10px;}
.ii .l{font-size:10px;color:#888;}.ii .v{font-size:12px;font-weight:700;color:#0f5442;}
table{width:100%;border-collapse:collapse;}
.notes{background:#f5f4f0;border-radius:6px;padding:8px 12px;margin-top:10px;font-size:11px;color:#555;line-height:1.8;}
.sign{display:flex;justify-content:space-between;margin-top:16px;font-size:11px;color:#666;padding-top:8px;border-top:1px solid #e0ddd5;}
${pageCSS}
@media print{button{display:none;}tr{page-break-inside:avoid;}body{padding:8px;}}
</style></head><body>
<div class="hdr"><div style="font-size:22px;margin-bottom:3px;">📖</div><h1>${title}</h1><div class="s">${halaqa?halaqa+' · ':''}${date}</div></div>
<div class="info">
  <div class="ii"><div class="l">${f?'الطالبة':'الطالب'}</div><div class="v">${name}</div></div>
  ${teacher?`<div class="ii"><div class="l">${f?'المعلمة':'المعلم'}</div><div class="v">${teacher}</div></div>`:''}
  ${halaqa?`<div class="ii"><div class="l">الحلقة</div><div class="v">${halaqa}</div></div>`:''}
  ${date?`<div class="ii"><div class="l">الفترة</div><div class="v">${date}</div></div>`:''}
</div>
<table><thead><tr><th style="background:#0f5442;color:#fff;padding:7px 8px;border:1px solid rgba(255,255,255,.2);width:32px;font-size:10px;">#</th>${hdrHTML}</tr></thead>
<tbody>${bodyRows.join('')}</tbody></table>
${notes?`<div class="notes">📝 ${notes.replace(/\n/g,'<br/>')}</div>`:''}
<div class="sign"><span>${lbl1}: ________________</span><span>${lbl2}: ________________</span></div>
${!forShare?`<script>window.onload=()=>window.print();<\/script>`:`<div style="margin-top:12px;padding:8px;background:#e8f5f0;border-radius:6px;font-size:11px;color:#0f5442;text-align:center;">📲 خذ screenshot وأرسله على واتساب</div>`}
</body></html>`;
}

function doPrint(o){
  const css=o==='l'?'@page{size:A4 landscape;}':'@page{size:A4 portrait;}';
  const w=window.open('','_blank'); w.document.write(buildDoc(false,css)); w.document.close();
}
function doShare(){
  const w=window.open('','_blank'); w.document.write(buildDoc(true,'')); w.document.close();
}

// ══ TOAST ══
function toast(msg,type='ok',ms=3000){
  const wrap=document.getElementById('toast-wrap');
  const t=document.createElement('div');
  t.className='toast '+type; t.textContent=msg;
  wrap.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},ms);
}

// ══ UTILS ══
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══ START ══
init();
</script>
</body>
</html>
